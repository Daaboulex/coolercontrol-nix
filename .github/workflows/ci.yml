name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-packages:
    name: Build all packages
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Setup Cachix
        if: env.CACHIX_AUTH_TOKEN != ''
        uses: cachix/cachix-action@v15
        with:
          name: coolercontrol-nix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build coolercontrold
        run: nix build .#coolercontrold --no-link

      - name: Build coolercontrol-ui-data
        run: nix build .#coolercontrol-ui-data --no-link

      - name: Build coolercontrol-gui
        run: nix build .#coolercontrol-gui --no-link

      - name: Build coolerctl (includes pytest)
        run: nix build .#coolerctl --no-link

      - name: Push to Cachix
        if: env.CACHIX_AUTH_TOKEN != ''
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          nix build .#coolercontrold .#coolercontrol-gui .#coolercontrol-ui-data .#coolerctl 2>/dev/null
          cachix push coolercontrol-nix ./result*

  flake-check:
    name: Flake check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: nix flake check
        run: nix flake check

  # Note: Formatting is enforced by pre-commit hooks (treefmt) locally.
  # The flake does not export a formatter attribute, so nix fmt is not
  # available in CI. This is fine — the pre-commit hook catches all
  # formatting issues before commits reach the repo.
