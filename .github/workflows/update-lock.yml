name: Update flake.lock

on:
  schedule:
    - cron: '0 8 * * 0' # Sundays 8am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: DeterminateSystems/nix-installer-action@v16

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for existing PR
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --search "head:auto-update/flake-lock" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already open, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Update flake.lock
        if: steps.existing.outputs.skip != 'true'
        run: nix flake update

      - name: Check for changes
        if: steps.existing.outputs.skip != 'true'
        id: diff
        run: |
          if git diff --quiet flake.lock; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "flake.lock is already up to date"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR
        if: steps.existing.outputs.skip != 'true' && steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="auto-update/flake-lock-${DATE}"

          git checkout -b "$BRANCH"
          git add flake.lock
          git commit -m "chore: update flake.lock"
          git push origin "$BRANCH"

          METADATA=$(nix flake metadata --json 2>/dev/null | jq -r '.locks.nodes.nixpkgs.locked.rev // "unknown"')

          gh pr create \
            --title "chore: update flake.lock (${DATE})" \
            --label "auto-update" \
            --body "$(cat <<EOF
          ## Flake lock update

          Updated \`flake.lock\` inputs.

          **nixpkgs revision:** \`${METADATA}\`

          This PR was created automatically. CI will verify the build.
          EOF
          )"
