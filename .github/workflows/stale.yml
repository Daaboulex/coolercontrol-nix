name: Stale cleanup

on:
  schedule:
    - cron: '0 6 * * *' # Daily 6am UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 14
          days-before-close: 3
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security
          exempt-pr-labels: pinned,security,auto-update
          stale-issue-message: >
            This issue has been inactive for 14 days.
            It will be closed in 3 days unless there is new activity.
          stale-pr-message: >
            This PR has been inactive for 14 days.
            It will be closed in 3 days unless there is new activity.
